<!doctype html>
<html lang="en" data-theme="default" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta name="description" content="A quiet, ad-free room for your JSON. Viewer, formatter, and side-by-side diff for debugging API responses." />
    <meta name="theme-color" content="#1a1e26" />
    <title>JSONRoom — a quiet room for your JSON</title>
    <!--
      Apply the persisted theme before first paint to avoid a flash of the
      wrong theme. Kept intentionally tiny and inlined.
    -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('jsonroom.theme.v1');
          if (t !== 'default' && t !== 'dark' && t !== 'light') t = 'default';
          document.documentElement.setAttribute('data-theme', t);
          if (t === 'light') document.documentElement.classList.remove('dark');
          else document.documentElement.classList.add('dark');
        } catch (_) { /* ignore */ }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-bg-base text-ink-primary">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
